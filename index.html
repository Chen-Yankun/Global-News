<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全球新闻实时雷达</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
            /* 强制地图背景为白色 */
            background: #ffffff !important; 
        }

        /* 隐藏地图版权信息使画面更干净 */
        .leaflet-control-attribution {
            display: none;
        }

        /* 发光圆点特效 */
        .glow-dot {
            border-radius: 50%;
            border: 2px solid #ffffff;
            opacity: 0.85;
            transition: transform 0.2s, opacity 0.2s;
        }
        
        .glow-dot:hover {
            transform: scale(1.5);
            opacity: 1;
            z-index: 1000 !important;
        }

        /* 自定义滚动条 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #c1c1c1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8; 
        }

        /* 控制面板响应式 */
        @media (max-width: 768px) {
            #control-panel {
                bottom: 20px;
                top: auto;
                left: 10px;
                right: 10px;
                width: auto;
                max-height: 40vh;
                overflow-y: auto;
            }
        }
    </style>
</head>
<body class="relative text-gray-800">

    <!-- 地图容器 -->
    <div id="map"></div>

    <!-- 左侧控制台/图例 -->
    <div id="control-panel" class="absolute top-6 left-6 z-[1000] bg-white/90 backdrop-blur-md p-5 rounded-2xl shadow-xl w-80 max-w-[calc(100vw-40px)] border border-gray-100 transition-all">
        <h1 class="text-xl font-bold mb-1 flex items-center gap-2">
            <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            全球新闻雷达
        </h1>
        <p class="text-xs text-gray-500 mb-4">呈现最近20小时内的热点新闻分布</p>
        
        <div class="space-y-2 mb-5">
            <h3 class="text-sm font-semibold text-gray-700">新闻分类 (颜色)</h3>
            <div class="grid grid-cols-2 gap-2 text-sm">
                <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-[#ff0000] shadow-[0_0_8px_#ff0000] mr-2"></span>战争新闻</div>
                <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-[#0000ff] shadow-[0_0_8px_#0000ff] mr-2"></span>财经新闻</div>
                <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-[#00ff00] shadow-[0_0_8px_#00ff00] mr-2"></span>生物医疗</div>
                <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-[#ffd700] shadow-[0_0_8px_#ffd700] mr-2"></span>体育新闻</div>
                <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-[#000000] shadow-[0_0_8px_#000000] mr-2"></span>科技新闻</div>
                <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-[#b5651d] shadow-[0_0_8px_#b5651d] mr-2"></span>农业新闻</div>
                <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-[#808080] shadow-[0_0_8px_#808080] mr-2"></span>其他新闻</div>
            </div>
            <p class="text-xs text-gray-400 mt-2">注：未识别地点的新闻集中在南极洲</p>
        </div>

        <div class="flex flex-col gap-3">
            <button id="btn-fetch-live" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-xl shadow transition flex justify-center items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                拉取最新谷歌新闻 (所有板块)
            </button>
            <div id="status-text" class="text-xs text-center text-gray-500 h-4">当前展示：等待拉取数据...</div>
        </div>
    </div>

    <!-- 右侧边栏 -->
    <div id="sidebar" class="fixed right-0 top-0 h-full w-full md:w-[400px] bg-white/95 backdrop-blur-xl shadow-[-10px_0_30px_rgba(0,0,0,0.1)] transform translate-x-full transition-transform duration-300 ease-out z-[2000] flex flex-col border-l border-gray-100">
        <!-- 头部 -->
        <div class="px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-white sticky top-0 z-10">
            <div>
                <h2 id="sidebar-title" class="text-xl font-bold text-gray-800">地点新闻</h2>
                <p id="sidebar-subtitle" class="text-sm text-gray-500 mt-1">相关报道</p>
            </div>
            <button id="close-sidebar" class="p-2 bg-gray-100 hover:bg-gray-200 rounded-full text-gray-600 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        
        <!-- 新闻列表内容区 -->
        <div id="sidebar-content" class="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar">
            <!-- 动态注入内容 -->
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // ==========================================
        // 配置数据
        // ==========================================

        // 分类及关键字配置
        const CATEGORIES = {
            war: { name: '战争新闻', color: '#ff0000', keywords: ['战争', '冲突', '导弹', '袭击', '军队', '俄乌', '伤亡', '武装', '击落', '军事', '防空', '加沙', '以军'] },
            finance: { name: '财经新闻', color: '#0000ff', keywords: ['财经', '经济', '股市', '基金', '降息', '银行', '融资', 'A股', '纳斯达克', '财报', '股价', '央行', '美联储'] },
            medical: { name: '生物医疗', color: '#00ff00', keywords: ['医疗', '医院', '病毒', '基因', '疫苗', '癌症', '疫情', '生物', '健康', '疾控', '制药'] },
            sports: { name: '体育新闻', color: '#ffd700', keywords: ['体育', '足球', '篮球', '奥运', '夺冠', '锦标赛', 'NBA', '英超', '世界杯', '冠军', '联赛'] },
            tech: { name: '科技新闻', color: '#000000', keywords: ['科技', '苹果', '华为', '微软', '芯片', 'AI', '人工智能', '算法', '互联网', '软件', '大模型', 'OpenAI', '特斯拉'] },
            agri: { name: '农业新闻', color: '#b5651d', keywords: ['农业', '粮食', '农产品', '丰收', '种植', '农民', '小麦', '大豆', '农田', '畜牧'] },
            other: { name: '其他新闻', color: '#808080', keywords: [] }
        };

        // 地名词典与经纬度 (为避免多个新闻完全重叠，渲染时会加微小偏移)
        const LOCATIONS = {
            "北京": [39.9042, 116.4074], "上海": [31.2304, 121.4737], "广东": [23.1291, 113.2644], "深圳": [22.5431, 114.0579],
            "香港": [22.3193, 114.1694], "台湾": [23.6978, 120.9605], "新疆": [43.7928, 87.6211],
            "美国": [37.0902, -95.7129], "纽约": [40.7128, -74.0060], "华盛顿": [38.9072, -77.0369], "硅谷": [37.3875, -122.0575],
            "俄罗斯": [61.5240, 105.3188], "莫斯科": [55.7558, 37.6173], "乌克兰": [48.3794, 31.1656], "基辅": [50.4501, 30.5234],
            "日本": [36.2048, 138.2529], "东京": [35.6762, 139.6503], "韩国": [35.9078, 127.7669], "首尔": [37.5665, 126.9780],
            "英国": [55.3781, -3.4360], "伦敦": [51.5074, -0.1278], "法国": [46.2276, 2.2137], "巴黎": [48.8566, 2.3522],
            "德国": [51.1657, 10.4515], "柏林": [52.5200, 13.4050], "印度": [20.5937, 78.9629], "新德里": [28.6139, 77.2090],
            "中东": [29.2985, 42.5510], "以色列": [31.0461, 34.8516], "加沙": [31.5017, 34.4668], "伊朗": [32.4279, 53.6880],
            "澳大利亚": [-25.2744, 133.7751], "加拿大": [56.1304, -106.3468], "巴西": [-14.2350, -51.9253], "非洲": [8.7832, 34.5085]
        };

        // 谷歌新闻（Google News）的各大板块 RSS 源
        const GOOGLE_NEWS_FEEDS = [
            "https://news.google.com/rss?hl=zh-CN&gl=CN&ceid=CN:zh-Hans", // 焦点新闻
            "https://news.google.com/rss/headlines/section/topic/WORLD?hl=zh-CN&gl=CN&ceid=CN:zh-Hans", // 国际
            "https://news.google.com/rss/headlines/section/topic/NATION?hl=zh-CN&gl=CN&ceid=CN:zh-Hans", // 国内
            "https://news.google.com/rss/headlines/section/topic/BUSINESS?hl=zh-CN&gl=CN&ceid=CN:zh-Hans", // 财经
            "https://news.google.com/rss/headlines/section/topic/TECHNOLOGY?hl=zh-CN&gl=CN&ceid=CN:zh-Hans", // 科技
            "https://news.google.com/rss/headlines/section/topic/ENTERTAINMENT?hl=zh-CN&gl=CN&ceid=CN:zh-Hans", // 娱乐
            "https://news.google.com/rss/headlines/section/topic/SPORTS?hl=zh-CN&gl=CN&ceid=CN:zh-Hans", // 体育
            "https://news.google.com/rss/headlines/section/topic/SCIENCE?hl=zh-CN&gl=CN&ceid=CN:zh-Hans", // 科学
            "https://news.google.com/rss/headlines/section/topic/HEALTH?hl=zh-CN&gl=CN&ceid=CN:zh-Hans" // 健康
        ];

        // 状态变量
        let map;
        let markersGroup;
        let activeNewsData = []; // 当前地图上展示的所有新闻

        // ==========================================
        // 初始化地图
        // ==========================================
        function initMap() {
            // 中心点偏向北半球
            map = L.map('map', {
                zoomControl: false,
                worldCopyJump: true,
                minZoom: 2
            }).setView([30, 0], 3);

            // 移动缩放控件到右上角
            L.control.zoom({ position: 'topright' }).addTo(map);

            // 使用纯白色、无标注的底图 (CartoDB Positron No Labels)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);

            markersGroup = L.layerGroup().addTo(map);
        }

        // ==========================================
        // NLP 与数据分析核心逻辑
        // ==========================================

        // 根据文本匹配分类
        function determineCategory(title, desc) {
            const text = (title + " " + desc).toLowerCase();
            for (const [key, cat] of Object.entries(CATEGORIES)) {
                if (key === 'other') continue;
                for (const keyword of cat.keywords) {
                    if (text.includes(keyword.toLowerCase())) {
                        return key;
                    }
                }
            }
            return 'other';
        }

        // 提取地点，找不到则返回南极洲随机点
        function determineLocation(title, desc) {
            const text = title + " " + desc;
            for (const [locName, coords] of Object.entries(LOCATIONS)) {
                if (text.includes(locName)) {
                    return { name: locName, lat: coords[0], lng: coords[1] };
                }
            }
            // 未识别地点 -> 南极洲 (纬度 -75 到 -85 之间随机，经度全范围随机)
            return {
                name: "未识别地点 (南极大陆)",
                lat: -75 - Math.random() * 10,
                lng: (Math.random() * 360) - 180
            };
        }

        // 获取距离现在的时间描述
        function timeAgo(date) {
            const minutes = Math.floor((new Date() - date) / 60000);
            if (minutes < 1) return '刚刚';
            if (minutes < 60) return `${minutes}分钟前`;
            return `${Math.floor(minutes / 60)}小时${minutes % 60}分钟前`;
        }

        // ==========================================
        // 渲染标记与交互
        // ==========================================

        function renderNewsOnMap(newsItems) {
            markersGroup.clearLayers();
            activeNewsData = newsItems;

            if (newsItems.length === 0) {
                alert("指定时间范围内没有发现任何新闻。");
                return;
            }

            // 为了避免同一个城市的点完全重合，加入随机偏移
            newsItems.forEach((news, index) => {
                const catInfo = CATEGORIES[news.category];
                
                // 抖动偏移量 (0.1 ~ 1度之间)
                const jitterLat = (Math.random() - 0.5) * 1.5;
                const jitterLng = (Math.random() - 0.5) * 1.5;
                
                const finalLat = news.location.lat + jitterLat;
                const finalLng = news.location.lng + jitterLng;

                const color = catInfo.color;
                
                // 创建 HTML 图标
                const icon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div class="glow-dot" style="background-color: ${color}; box-shadow: 0 0 12px ${color}, 0 0 20px ${color}; width: 14px; height: 14px;"></div>`,
                    iconSize: [14, 14],
                    iconAnchor: [7, 7]
                });

                const marker = L.marker([finalLat, finalLng], { icon: icon }).addTo(markersGroup);
                
                // 绑定点击事件打开侧边栏
                marker.on('click', () => {
                    openSidebar(news);
                });
            });
        }

        // ==========================================
        // 侧边栏控制
        // ==========================================
        
        const sidebar = document.getElementById('sidebar');
        const sidebarContent = document.getElementById('sidebar-content');
        const sidebarTitle = document.getElementById('sidebar-title');
        const sidebarSubtitle = document.getElementById('sidebar-subtitle');

        function openSidebar(selectedNews) {
            // 找出同一区域（或者同一类别如果需要）的新闻。这里简单展示被点击的新闻，并列出同一分类的其他近期新闻
            sidebarTitle.textContent = selectedNews.location.name;
            sidebarSubtitle.textContent = CATEGORIES[selectedNews.category].name + " · " + timeAgo(selectedNews.pubDate);
            
            // 组装 HTML
            let html = `
                <div class="mb-6">
                    <span class="inline-block px-2 py-1 rounded text-xs text-white font-medium mb-3" style="background-color: ${CATEGORIES[selectedNews.category].color}">
                        ${CATEGORIES[selectedNews.category].name}
                    </span>
                    <h3 class="text-xl font-bold text-gray-900 mb-2">${selectedNews.title}</h3>
                    <p class="text-gray-600 text-sm leading-relaxed mb-4 line-clamp-6">${selectedNews.desc.replace(/<[^>]+>/g, '') || '暂无详细描述。'}</p>
                    <a href="${selectedNews.link}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center text-blue-600 hover:text-blue-800 text-sm font-semibold">
                        阅读原文 <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                    </a>
                </div>
                <hr class="border-gray-100 mb-6">
                <h4 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    近期相关 (${selectedNews.location.name})
                </h4>
            `;

            // 查找同一个地点的其他新闻
            const relatedNews = activeNewsData.filter(n => n.location.name === selectedNews.location.name && n !== selectedNews);
            
            if (relatedNews.length > 0) {
                html += `<div class="space-y-4">`;
                relatedNews.forEach(news => {
                    html += `
                        <div class="bg-gray-50 p-4 rounded-xl hover:bg-gray-100 transition cursor-pointer border border-gray-100" onclick="window.open('${news.link}', '_blank')">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="w-2 h-2 rounded-full" style="background-color: ${CATEGORIES[news.category].color}"></span>
                                <span class="text-xs text-gray-500">${timeAgo(news.pubDate)}</span>
                            </div>
                            <h5 class="text-sm font-semibold text-gray-800 line-clamp-2">${news.title}</h5>
                        </div>
                    `;
                });
                html += `</div>`;
            } else {
                html += `<p class="text-sm text-gray-500 italic">20小时内该区域无其他新闻。</p>`;
            }

            sidebarContent.innerHTML = html;
            sidebar.classList.remove('translate-x-full');
        }

        document.getElementById('close-sidebar').addEventListener('click', () => {
            sidebar.classList.add('translate-x-full');
        });

        // ==========================================
        // 数据获取 (真实 RSS)
        // ==========================================

        const statusText = document.getElementById('status-text');
        const btnFetch = document.getElementById('btn-fetch-live');

        // 真实抓取并解析 RSS
        async function fetchLiveRss() {
            btnFetch.disabled = true;
            btnFetch.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>拉取与解析中...`;
            statusText.textContent = "正在通过代理拉取谷歌新闻全板块，可能需要10-20秒...";

            let allNews = [];
            // 更新为20小时
            const TWENTY_HOURS_MS = 20 * 60 * 60 * 1000;
            const now = Date.now();

            try {
                // 使用公共 CORS 代理并发抓取所有板块 (如果部分不可用属于正常网络现象)
                const promises = GOOGLE_NEWS_FEEDS.map(async (url) => {
                    try {
                        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                        const response = await fetch(proxyUrl);
                        if (!response.ok) return [];
                        
                        const data = await response.json();
                        const parser = new DOMParser();
                        const xml = parser.parseFromString(data.contents, "text/xml");
                        
                        // 兼容 RSS 2.0 和 Atom
                        const items = Array.from(xml.querySelectorAll("item, entry"));
                        
                        return items.map(item => {
                            const title = (item.querySelector("title")?.textContent || "").trim();
                            
                            // 更严谨的链接解析逻辑（应对多种复杂的 RSS 标签结构和空格污染）
                            let link = "#";
                            const linkNodes = item.querySelectorAll("link");
                            for (const node of linkNodes) {
                                const href = node.getAttribute("href")?.trim();
                                const text = node.textContent?.trim();
                                // 优先取包含 http 头的有效属性或文本值
                                if (href && href.startsWith("http")) {
                                    link = href;
                                    break;
                                } else if (text && text.startsWith("http")) {
                                    link = text;
                                    break;
                                }
                            }
                            
                            // 如果 link 解析失败，很多 RSS 会将链接放在 guid 或 id 标签中
                            if (link === "#") {
                                const guid = item.querySelector("guid, id")?.textContent?.trim();
                                if (guid && guid.startsWith("http")) link = guid;
                            }

                            const desc = (item.querySelector("description, summary, content")?.textContent || "").trim();
                            const pubDateStr = item.querySelector("pubDate, published, updated")?.textContent;
                            const pubDate = new Date(pubDateStr);
                            
                            return { title, link, desc, pubDate };
                        }).filter(item => {
                            // 过滤: 有效时间且在过去20小时内
                            return !isNaN(item.pubDate) && (now - item.pubDate.getTime()) <= TWENTY_HOURS_MS && item.pubDate.getTime() <= now;
                        }).map(item => {
                            // 归类与定位
                            const category = determineCategory(item.title, item.desc);
                            const location = determineLocation(item.title, item.desc);
                            return { ...item, category, location };
                        });
                    } catch (e) {
                        console.warn("RSS获取失败:", url, e);
                        return [];
                    }
                });

                const results = await Promise.all(promises);
                results.forEach(res => allNews.push(...res));

                if (allNews.length > 0) {
                    renderNewsOnMap(allNews);
                    statusText.textContent = `拉取成功！在最近20小时内找到 ${allNews.length} 条新闻`;
                } else {
                    statusText.textContent = `实时拉取完成，但各大板块最近20小时内无新内容。`;
                    renderNewsOnMap([]);
                }

            } catch (err) {
                statusText.textContent = "网络代理获取失败，请重试。";
                renderNewsOnMap([]);
            } finally {
                btnFetch.disabled = false;
                btnFetch.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>拉取最新谷歌新闻 (所有板块)`;
            }
        }

        // ==========================================
        // 启动执行
        // ==========================================
        window.onload = () => {
            initMap();
            // 绑定抓取按钮事件
            btnFetch.addEventListener('click', fetchLiveRss);
        };
    </script>
</body>
</html>

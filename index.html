<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球新闻实时监测地图 (增强版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .country {
            stroke: #1e293b;
            stroke-width: 0.5px;
            transition: stroke 0.3s ease;
            cursor: pointer;
        }
        .country:hover {
            opacity: 0.8;
            stroke: #fff;
            stroke-width: 1px;
        }
        .loading-overlay {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
        .critical-pulse {
            animation: pulse 2s infinite ease-in-out;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Header -->
    <header class="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-900/50 backdrop-blur-md z-10">
        <div>
            <h1 class="text-xl font-bold flex items-center gap-2">
                <span class="inline-block w-3 h-3 bg-red-500 rounded-full animate-ping"></span>
                全球新闻实时动态 
            </h1>
            <p class="text-xs text-slate-400">实时抓取国内公开新闻源并通过地理关键词自动匹配</p>
        </div>
        <div class="flex gap-4 items-center">
            <div class="flex gap-2 text-xs">
                <span class="flex items-center gap-1"><i class="w-2 h-2 bg-red-500 rounded-full"></i> 重大紧急</span>
                <span class="flex items-center gap-1"><i class="w-2 h-2 bg-blue-500 rounded-full"></i> 重要新闻</span>
                <span class="flex items-center gap-1"><i class="w-2 h-2 bg-green-500 rounded-full"></i> 普通新闻</span>
            </div>
            <button onclick="refreshNews()" id="refreshBtn" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg transition text-sm">
                刷新新闻
            </button>
        </div>
    </header>

    <main class="flex-1 relative overflow-hidden">
        <!-- Map Container -->
        <div id="map" class="w-full h-full"></div>

        <!-- News Side Panel -->
        <div id="sidePanel" class="absolute right-0 top-0 h-full w-80 bg-slate-900/90 border-l border-slate-700 translate-x-full transition-transform duration-300 z-20 overflow-y-auto scrollbar-hide">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="panelTitle" class="text-lg font-bold">区域新闻</h2>
                    <button onclick="closePanel()" class="text-slate-400 hover:text-white">✕</button>
                </div>
                <div id="newsList" class="space-y-6">
                    <!-- News items will be injected here -->
                </div>
            </div>
        </div>

        <!-- Loading -->
        <div id="loader" class="absolute inset-0 flex items-center justify-center z-50 loading-overlay hidden">
            <div class="text-center">
                <div class="inline-block w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                <p id="loaderText" class="mt-4 text-slate-300 font-medium">正在获取中文新闻数据...</p>
            </div>
        </div>

        <!-- Tooltip -->
        <div id="tooltip" class="absolute hidden bg-slate-800 text-white px-3 py-2 rounded text-xs pointer-events-none shadow-xl border border-slate-600 z-30"></div>
    </main>

    <script>
        let newsData = [];
        let worldData;
        let svg, projection, path, g;
        let countriesList = [];

        const CATEGORY_COLORS = {
            'Critical': '#ef4444',
            'Important': '#3b82f6',
            'Normal': '#86efac',
            'Default': '#334155'
        };

        // 扩充中英文映射表
        const CN_EN_MAP = {
            "中国": "China", "美国": "United States of America", "俄罗斯": "Russia", "乌克兰": "Ukraine",
            "日本": "Japan", "韩国": "South Korea", "朝鲜": "North Korea", "英国": "United Kingdom",
            "法国": "France", "德国": "Germany", "以色列": "Israel", "巴勒斯坦": "Palestine",
            "伊朗": "Iran", "伊拉克": "Iraq", "叙利亚": "Syria", "土耳其": "Turkey",
            "印度": "India", "巴基斯坦": "Pakistan", "菲律宾": "Philippines", "越南": "Vietnam",
            "澳大利亚": "Australia", "加拿大": "Canada", "巴西": "Brazil", "阿根廷": "Argentina",
            "埃及": "Egypt", "南非": "South Africa", "沙特": "Saudi Arabia", "阿联酋": "United Arab Emirates",
            "意大利": "Italy", "西班牙": "Spain", "缅甸": "Myanmar", "泰国": "Thailand", "哈萨克斯坦": "Kazakhstan",
            "印尼": "Indonesia", "墨西哥": "Mexico", "波兰": "Poland", "白俄罗斯": "Belarus"
        };

        async function initMap() {
            const width = window.innerWidth;
            const height = window.innerHeight;

            svg = d3.select("#map")
                .append("svg")
                .attr("width", "100%")
                .attr("height", "100%")
                .call(d3.zoom().scaleExtent([1, 8]).on("zoom", (event) => {
                    g.attr("transform", event.transform);
                }));

            g = svg.append("g");

            projection = d3.geoMercator()
                .scale(width / 6.5)
                .translate([width / 2.2, height / 1.6]);

            path = d3.geoPath().projection(projection);

            try {
                const response = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
                worldData = await response.json();
                countriesList = topojson.feature(worldData, worldData.objects.countries).features;

                g.selectAll("path")
                    .data(countriesList)
                    .enter()
                    .append("path")
                    .attr("class", "country")
                    .attr("d", path)
                    .attr("fill", CATEGORY_COLORS.Default)
                    .attr("id", d => `country-${String(d.id).padStart(3, '0')}`)
                    .on("mouseover", showTooltip)
                    .on("mouseout", hideTooltip)
                    .on("click", (event, d) => handleCountryClick(d));

                refreshNews();
            } catch (err) {
                console.error("无法加载地图数据", err);
            }
        }

        function showTooltip(event, d) {
            const countryName = d.properties.name;
            const tooltip = d3.select("#tooltip");
            tooltip.style("display", "block")
                   .html(`<strong>${countryName}</strong>`)
                   .style("left", (event.pageX + 15) + "px")
                   .style("top", (event.pageY - 28) + "px");
        }

        function hideTooltip() {
            d3.select("#tooltip").style("display", "none");
        }

        // 核心修复：增加多源备用和错误处理
        async function fetchChineseNews() {
            const loader = document.getElementById('loader');
            const loaderText = document.getElementById('loaderText');
            loader.classList.remove('hidden');
            
            // 备选 API 列表
            const apiUrls = [
                'https://api.vvhan.com/api/60s?type=json',
                'https://api.oick.cn/api/60s',
                'https://60s.viki.moe/60s?v2=true'
            ];

            for (let url of apiUrls) {
                try {
                    loaderText.innerText = `正在尝试接口: ${new URL(url).hostname}...`;
                    const res = await fetch(url, { cache: 'no-cache' });
                    if (!res.ok) continue;
                    const result = await res.json();
                    
                    let newsStrings = result.data || result.news || [];
                    if (newsStrings.length === 0) continue;

                    const processedNews = processRawNews(newsStrings);
                    if (processedNews.length > 0) {
                        loader.classList.add('hidden');
                        return processedNews;
                    }
                } catch (error) {
                    console.warn(`接口 ${url} 请求失败，尝试下一个...`);
                }
            }

            // 如果所有接口都失败，使用预设数据作为最后防线
            console.error("所有实时接口均不可用，加载预设演示数据。");
            loader.classList.add('hidden');
            return getFallbackNews();
        }

        function processRawNews(newsStrings) {
            const processed = [];
            newsStrings.forEach(newsText => {
                const matchedCountry = findCountryInChineseText(newsText);
                if (matchedCountry) {
                    let category = 'Normal';
                    if (newsText.match(/冲突|战争|死伤|坠毁|爆炸|地震|紧急|袭击|导弹|遇难|冲突/)) {
                        category = 'Critical';
                    } else if (newsText.match(/签署|大选|总统|峰会|首脑|贸易|协议|制裁|通胀|加息/)) {
                        category = 'Important';
                    }

                    processed.push({
                        country: matchedCountry.properties.name,
                        country_code: String(matchedCountry.id).padStart(3, '0'),
                        category: category,
                        headline: newsText,
                        summary: "全球资讯实时汇总",
                        source: "中文实时源",
                        link: "#" 
                    });
                }
            });
            return processed;
        }

        // 预设回退数据，防止地图全黑
        function getFallbackNews() {
            const mock = [
                { text: "俄罗斯与乌克兰地区局势持续引发全球关注", code: "643", cat: "Critical" },
                { text: "美国公布最新季度经济增长数据", code: "840", cat: "Important" },
                { text: "中方就全球贸易合作发表重要讲话", code: "156", cat: "Important" },
                { text: "日本南部海域发生轻微地质活动监测", code: "392", cat: "Normal" },
                { text: "德国工业自动化展会今日开幕", code: "276", cat: "Normal" },
                { text: "中东地区多国签署能源合作备忘录", code: "682", cat: "Important" }
            ];
            return mock.map(m => ({
                country: "预设区域",
                country_code: m.code,
                category: m.cat,
                headline: m.text,
                summary: "由于网络连接问题，当前显示为离线备份数据",
                source: "备份系统",
                link: "#"
            }));
        }

        function findCountryInChineseText(text) {
            if (!text) return null;
            for (const [cnName, enName] of Object.entries(CN_EN_MAP)) {
                if (text.includes(cnName)) {
                    return countriesList.find(c => c.properties.name === enName);
                }
            }
            return null;
        }

        async function refreshNews() {
            newsData = await fetchChineseNews();
            updateMapColors();
        }

        function updateMapColors() {
            const allCountries = g.selectAll(".country");
            allCountries.classed("critical-pulse", false);
            allCountries.transition().duration(500).attr("fill", CATEGORY_COLORS.Default);

            newsData.forEach(item => {
                const countryElement = d3.select(`#country-${item.country_code}`);
                if (!countryElement.empty()) {
                    if (item.category === 'Critical') {
                        countryElement.classed("critical-pulse", true);
                    }
                    countryElement.transition()
                        .duration(1000)
                        .attr("fill", CATEGORY_COLORS[item.category]);
                }
            });
        }

        function handleCountryClick(d) {
            const countryId = String(d.id).padStart(3, '0');
            const newsItems = newsData.filter(n => n.country_code === countryId);
            const panel = document.getElementById('sidePanel');
            const title = document.getElementById('panelTitle');
            const list = document.getElementById('newsList');
            
            title.innerText = d.properties.name;
            list.innerHTML = '';

            if (newsItems.length > 0) {
                newsItems.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "border-b border-slate-700 pb-4 last:border-0";
                    div.innerHTML = `
                        <div class="flex items-center gap-2 mb-2">
                            <span class="px-2 py-0.5 rounded text-[10px] font-bold uppercase" style="background: ${CATEGORY_COLORS[item.category]}44; color: ${CATEGORY_COLORS[item.category]}">
                                ${item.category === 'Critical' ? '重大' : (item.category === 'Important' ? '重要' : '常规')}
                            </span>
                            <span class="text-xs text-slate-500">${item.source}</span>
                        </div>
                        <h3 class="font-bold text-sm mb-2 text-white leading-relaxed">${item.headline}</h3>
                        <p class="text-[10px] text-slate-500 mt-1 italic">${item.summary}</p>
                    `;
                    list.appendChild(div);
                });
            } else {
                list.innerHTML = `<p class="text-slate-500 text-sm italic">当前中文汇总中暂无该地区的匹配报道。</p>`;
            }
            panel.classList.remove('translate-x-full');
        }

        function closePanel() {
            document.getElementById('sidePanel').classList.add('translate-x-full');
        }

        window.onload = initMap;
        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            svg.attr("width", width).attr("height", height);
        });
    </script>
</body>
</html>

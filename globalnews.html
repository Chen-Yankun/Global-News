<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球新闻实时监测地图 (免API版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .country {
            stroke: #1e293b;
            stroke-width: 0.5px;
            transition: stroke 0.3s ease;
            cursor: pointer;
        }
        .country:hover {
            opacity: 0.8;
            stroke: #fff;
            stroke-width: 1px;
        }
        .loading-overlay {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
        .critical-pulse {
            animation: pulse 2s infinite ease-in-out;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Header -->
    <header class="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-900/50 backdrop-blur-md z-10">
        <div>
            <h1 class="text-xl font-bold flex items-center gap-2">
                <span class="inline-block w-3 h-3 bg-red-500 rounded-full animate-ping"></span>
                全球新闻实时动态 (免API版)
            </h1>
            <p class="text-xs text-slate-400">实时检索公开新闻源并通过地理关键词自动匹配</p>
        </div>
        <div class="flex gap-4 items-center">
            <div class="flex gap-2 text-xs">
                <span class="flex items-center gap-1"><i class="w-2 h-2 bg-red-500 rounded-full"></i> 重大紧急</span>
                <span class="flex items-center gap-1"><i class="w-2 h-2 bg-blue-500 rounded-full"></i> 重要新闻</span>
                <span class="flex items-center gap-1"><i class="w-2 h-2 bg-green-500 rounded-full"></i> 普通新闻</span>
            </div>
            <button onclick="refreshNews()" id="refreshBtn" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg transition text-sm">
                刷新新闻
            </button>
        </div>
    </header>

    <main class="flex-1 relative overflow-hidden">
        <!-- Map Container -->
        <div id="map" class="w-full h-full"></div>

        <!-- News Side Panel -->
        <div id="sidePanel" class="absolute right-0 top-0 h-full w-80 bg-slate-900/90 border-l border-slate-700 translate-x-full transition-transform duration-300 z-20 overflow-y-auto scrollbar-hide">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="panelTitle" class="text-lg font-bold">区域新闻</h2>
                    <button onclick="closePanel()" class="text-slate-400 hover:text-white">✕</button>
                </div>
                <div id="newsList" class="space-y-6">
                    <!-- News items will be injected here -->
                </div>
            </div>
        </div>

        <!-- Loading -->
        <div id="loader" class="absolute inset-0 flex items-center justify-center z-50 loading-overlay hidden">
            <div class="text-center">
                <div class="inline-block w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-4 text-slate-300 font-medium">正在检索全球最新动态...</p>
            </div>
        </div>

        <!-- Tooltip -->
        <div id="tooltip" class="absolute hidden bg-slate-800 text-white px-3 py-2 rounded text-xs pointer-events-none shadow-xl border border-slate-600 z-30"></div>
    </main>

    <script>
        let newsData = [];
        let worldData;
        let svg, projection, path, g;
        let countriesList = [];
        
        const CATEGORY_COLORS = {
            'Critical': '#ef4444',
            'Important': '#3b82f6',
            'Normal': '#86efac',
            'Default': '#334155'
        };

        // 地图初始化
        async function initMap() {
            const width = window.innerWidth;
            const height = window.innerHeight;

            svg = d3.select("#map")
                .append("svg")
                .attr("width", "100%")
                .attr("height", "100%")
                .call(d3.zoom().scaleExtent([1, 8]).on("zoom", (event) => {
                    g.attr("transform", event.transform);
                }));

            g = svg.append("g");

            projection = d3.geoMercator()
                .scale(width / 6.5)
                .translate([width / 2.2, height / 1.6]);

            path = d3.geoPath().projection(projection);

            try {
                const response = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
                worldData = await response.json();
                countriesList = topojson.feature(worldData, worldData.objects.countries).features;

                g.selectAll("path")
                    .data(countriesList)
                    .enter()
                    .append("path")
                    .attr("class", "country")
                    .attr("d", path)
                    .attr("fill", CATEGORY_COLORS.Default)
                    .attr("id", d => `country-${String(d.id).padStart(3, '0')}`)
                    .on("mouseover", showTooltip)
                    .on("mouseout", hideTooltip)
                    .on("click", (event, d) => handleCountryClick(d));

                refreshNews();
            } catch (err) {
                console.error("Failed to load map data", err);
            }
        }

        function showTooltip(event, d) {
            const countryName = d.properties.name;
            const tooltip = d3.select("#tooltip");
            tooltip.style("display", "block")
                   .html(`<strong>${countryName}</strong>`)
                   .style("left", (event.pageX + 15) + "px")
                   .style("top", (event.pageY - 28) + "px");
        }

        function hideTooltip() {
            d3.select("#tooltip").style("display", "none");
        }

        async function fetchPublicNews() {
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');
            
            try {
                // 使用 ok.surf 的公开新闻 API
                const res = await fetch('https://ok.surf/api/v1/cors/news-feed');
                if (!res.ok) throw new Error('Network response was not ok');
                const data = await res.json();
                
                const rawNews = data.World || [];
                const processedNews = [];

                rawNews.forEach(article => {
                    const matchedCountry = findCountryInText(article.title + " " + (article.content || ""));
                    
                    if (matchedCountry) {
                        let category = 'Normal';
                        const text = (article.title).toLowerCase();
                        if (text.match(/war|conflict|dead|killed|crisis|disaster|emergency|attack|explosion|missile/)) {
                            category = 'Critical';
                        } else if (text.match(/summit|election|president|prime minister|deal|economy|inflation|sanction|treaty/)) {
                            category = 'Important';
                        }

                        processedNews.push({
                            country: matchedCountry.properties.name,
                            country_code: String(matchedCountry.id).padStart(3, '0'),
                            category: category,
                            headline: article.title,
                            summary: article.source,
                            source: article.source,
                            link: article.link
                        });
                    }
                });

                return processedNews;
            } catch (error) {
                console.error("无法获取新闻数据", error);
                return [];
            } finally {
                loader.classList.add('hidden');
            }
        }

        function findCountryInText(text) {
            if (!text) return null;
            return countriesList.find(c => {
                const name = c.properties.name;
                // 简单的全词匹配，防止 "India" 匹配到 "Indiana" 等
                const regex = new RegExp(`\\b${name}\\b`, 'i');
                return regex.test(text);
            });
        }

        async function refreshNews() {
            newsData = await fetchPublicNews();
            updateMapColors();
        }

        function updateMapColors() {
            // 修正错误：classed 必须在 selection 对象上调用，不能在 transition 对象上调用
            const allCountries = g.selectAll(".country");
            
            // 1. 立即清除所有 pulse 效果并开始颜色过渡
            allCountries
                .classed("critical-pulse", false)
                .transition()
                .duration(500)
                .attr("fill", CATEGORY_COLORS.Default);

            // 2. 为有新闻的国家设置颜色
            newsData.forEach(item => {
                const countryElement = d3.select(`#country-${item.country_code}`);
                if (!countryElement.empty()) {
                    // 设置颜色过渡
                    countryElement.transition()
                        .duration(1000)
                        .attr("fill", CATEGORY_COLORS[item.category]);
                    
                    // 如果是紧急新闻，添加动画类（在 selection 上操作）
                    if (item.category === 'Critical') {
                        countryElement.classed("critical-pulse", true);
                    }
                }
            });
        }

        function handleCountryClick(d) {
            const countryId = String(d.id).padStart(3, '0');
            const newsItems = newsData.filter(n => n.country_code === countryId);
            
            const panel = document.getElementById('sidePanel');
            const title = document.getElementById('panelTitle');
            const list = document.getElementById('newsList');
            
            title.innerText = d.properties.name;
            list.innerHTML = '';

            if (newsItems.length > 0) {
                newsItems.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "border-b border-slate-700 pb-4 last:border-0";
                    div.innerHTML = `
                        <div class="flex items-center gap-2 mb-2">
                            <span class="px-2 py-0.5 rounded text-[10px] font-bold uppercase" style="background: ${CATEGORY_COLORS[item.category]}44; color: ${CATEGORY_COLORS[item.category]}">
                                ${item.category}
                            </span>
                            <span class="text-xs text-slate-500">${item.source}</span>
                        </div>
                        <a href="${item.link}" target="_blank" class="hover:text-blue-400 transition block">
                            <h3 class="font-bold text-sm mb-2 text-white leading-snug">${item.headline}</h3>
                        </a>
                        <p class="text-[10px] text-slate-500 mt-1 uppercase italic">点击标题查看原文</p>
                    `;
                    list.appendChild(div);
                });
            } else {
                list.innerHTML = `<p class="text-slate-500 text-sm italic">当前公开源中暂无此地区的匹配新闻。</p>`;
            }

            panel.classList.remove('translate-x-full');
        }

        function closePanel() {
            document.getElementById('sidePanel').classList.add('translate-x-full');
        }

        window.onload = initMap;
        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            svg.attr("width", width).attr("height", height);
        });
    </script>
</body>
</html>
